<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>To-Do List</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header">
    <h1>To-Do List</h1>
    <p class="subtitle">Demo: filtering (All / Active / Completed)</p>
  </header>

  <main class="wrapper">

    <!-- Top Card -->
    <section class="card">

      <form id="taskForm" class="task-form">
        <input
          type="text"
          id="taskInput"
          placeholder="e.g., Review DOM methods"
        />
        <button type="submit" class="btn-primary">Add</button>
      </form>

      <div class="filters">
        <button data-filter="all" class="filter-btn active">All</button>
        <button data-filter="active" class="filter-btn">Active</button>
        <button data-filter="completed" class="filter-btn">Completed</button>
      </div>

    </section>

    <!-- List Card -->
    <section class="card">
      <ul id="todoList" class="todo-list"></ul>
      <p id="counter" class="counter">0 items</p>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
