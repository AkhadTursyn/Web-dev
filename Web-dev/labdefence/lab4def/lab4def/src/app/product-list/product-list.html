<h1>🛍 Online Store</h1>

<div class="search-container">
  <label for="search">Search products</label>
  <input
    id="search"
    type="text"
    placeholder="Search by product name..."
    [formControl]="searchControl"
  />
</div>

<p>
  Showing {{ filteredProducts.length }} / {{ products.length }} products
</p>

<div class="products">
  <div class="card" *ngFor="let product of filteredProducts">

    <img [src]="product.image" alt="{{ product.name }}" />

    <h3>{{ product.name }}</h3>

    <p class="description">
      {{ product.description }}
    </p>

    <p class="price">
      ₸ {{ product.price | number }}
    </p>

    <p class="rating">
      ⭐ {{ product.rating }}
    </p>

    <div class="buttons">
      <button class="view-btn">View Product</button>
      <button class="share-btn">Share</button>
    </div>

  </div>
</div>

<p *ngIf="filteredProducts.length === 0">
  No products found
</p>
