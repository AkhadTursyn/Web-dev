<h2>⭐ Favorites ({{ favorites.length }})</h2>

<div *ngIf="favorites.length === 0">
  No favorite products yet
</div>

<div *ngIf="favorites.length > 0">
  <app-product-list
    [products]="favorites"
    (favoriteToggle)="toggleFavorite($event)">
  </app-product-list>
</div>

<hr>

<h2>Products</h2>

<app-product-list
  [products]="products"
  (favoriteToggle)="toggleFavorite($event)">
</app-product-list>
