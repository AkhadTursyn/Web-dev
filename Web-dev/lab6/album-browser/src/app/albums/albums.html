<h2>Albums</h2>

<a routerLink="/albums/new" class="btn">+ New Album</a>

<ul>
  <li *ngFor="let album of albums$ | async" class="album-item">

    <a [routerLink]="['/albums', album.id]">
      #{{ album.id }} — {{ album.title }}
    </a>

    <button (click)="delete(album.id)">
      Delete
    </button>

  </li>
</ul>
