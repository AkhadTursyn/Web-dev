<div *ngIf="loading">Loading photos...</div>

<div *ngIf="!loading">
  <h2>Album Photos</h2>

  <div class="photo-grid">
    <div *ngFor="let photo of photos" class="photo-card">
      <img [src]="photo.thumbnailUrl" />
      <p>{{ photo.title }}</p>
    </div>
  </div>

  <a routerLink="/albums">← Back to Albums</a>
</div>
